previews:
  generation: off

services:
  - type: web
    runtime: node
    name: movy-backend
    region: virginia
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    healthCheckPath: /api/readiness
    buildCommand: npm ci --include=dev && npm run prisma:generate:backend && npm run build --workspace backend
    preDeployCommand: npm run prisma:migrate:deploy --workspace backend && npm run prisma:seed --workspace backend
    startCommand: npm run start --workspace backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOVY_DATA_MODE
        value: prisma
      - key: DATABASE_URL
        fromDatabase:
          name: movy-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: TRUST_PROXY
        value: "true"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: HELMET_ENABLED
        value: "true"
      - key: MOVY_ALLOW_DASHBOARD_FALLBACK
        value: "false"
      - key: MOVY_DEMO_ADMIN_EMAIL
        value: admin@movy.local
      - key: MOVY_DEMO_ADMIN_PASSWORD
        sync: false
      - key: MOVY_DEMO_PASSENGER_EMAIL
        value: ana@movy.local
      - key: MOVY_DEMO_PASSENGER_PASSWORD
        sync: false
      - key: MOVY_DEMO_DRIVER_EMAIL
        value: carlos@movy.local
      - key: MOVY_DEMO_DRIVER_PASSWORD
        sync: false

  - type: web
    runtime: node
    name: movy-web
    region: virginia
    plan: starter
    branch: main
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev && npm run build --workspace frontend
    startCommand: npm run start --workspace frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOVY_BACKEND_BASE_URL
        fromService:
          type: web
          name: movy-backend
          property: hostport
      - key: MOVY_ALLOW_DASHBOARD_FALLBACK
        value: "false"
      - key: MOVY_DEMO_ADMIN_EMAIL
        fromService:
          type: web
          name: movy-backend
          envVarKey: MOVY_DEMO_ADMIN_EMAIL
      - key: MOVY_DEMO_ADMIN_PASSWORD
        fromService:
          type: web
          name: movy-backend
          envVarKey: MOVY_DEMO_ADMIN_PASSWORD
      - key: MOVY_DEMO_PASSENGER_EMAIL
        fromService:
          type: web
          name: movy-backend
          envVarKey: MOVY_DEMO_PASSENGER_EMAIL
      - key: MOVY_DEMO_PASSENGER_PASSWORD
        fromService:
          type: web
          name: movy-backend
          envVarKey: MOVY_DEMO_PASSENGER_PASSWORD
      - key: MOVY_DEMO_DRIVER_EMAIL
        fromService:
          type: web
          name: movy-backend
          envVarKey: MOVY_DEMO_DRIVER_EMAIL
      - key: MOVY_DEMO_DRIVER_PASSWORD
        fromService:
          type: web
          name: movy-backend
          envVarKey: MOVY_DEMO_DRIVER_PASSWORD

databases:
  - name: movy-postgres
    region: virginia
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: movy
    user: movy
