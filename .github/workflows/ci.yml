name: movy-ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Run application smoke stack
        env:
          NODE_ENV: production
          MOVY_DATA_MODE: memory
          JWT_SECRET: movy-ci-secret
          BACKEND_PORT: 4333
          PORT: 4300
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4333
          NEXT_PUBLIC_WS_URL: http://127.0.0.1:4333
          EXPO_PUBLIC_API_URL: http://127.0.0.1:4333
          CORS_ALLOWED_ORIGINS: http://127.0.0.1:4300
          TRUST_PROXY: "true"
          MOVY_ALLOW_DASHBOARD_FALLBACK: "false"
          MOVY_DEMO_ADMIN_EMAIL: admin@movy.ci
          MOVY_DEMO_ADMIN_PASSWORD: admin123
          MOVY_DEMO_PASSENGER_EMAIL: ana@movy.ci
          MOVY_DEMO_PASSENGER_PASSWORD: "123456"
          MOVY_DEMO_DRIVER_EMAIL: carlos@movy.ci
          MOVY_DEMO_DRIVER_PASSWORD: "123456"
        run: npm run smoke:ci

      - name: Upload backend artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          if-no-files-found: error

      - name: Upload frontend build metadata
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next
          path: frontend/.next
          include-hidden-files: true
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t movy/backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t movy/frontend:ci .
