services:
  postgres:
    container_name: movy-postgres
    image: postgres:16
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movy -d movy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: movy
      POSTGRES_USER: movy
      POSTGRES_PASSWORD: movy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: movy-redis
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    profiles: ["app"]
    container_name: movy-backend
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3333
      MOVY_DATA_MODE: prisma
      DATABASE_URL: postgresql://movy:movy@postgres:5432/movy
      REDIS_URL: redis://redis:6379
      JWT_SECRET: movy-local-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
      TRUST_PROXY: false
      RATE_LIMIT_MAX: 120
      RATE_LIMIT_WINDOW_MS: 60000
      HELMET_ENABLED: true
      MOVY_ALLOW_DASHBOARD_FALLBACK: "false"
      MOVY_DEMO_ADMIN_EMAIL: admin@movy.local
      MOVY_DEMO_ADMIN_PASSWORD: admin123
      MOVY_DEMO_PASSENGER_EMAIL: ana@movy.local
      MOVY_DEMO_PASSENGER_PASSWORD: 123456
      MOVY_DEMO_DRIVER_EMAIL: carlos@movy.local
      MOVY_DEMO_DRIVER_PASSWORD: 123456
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3333:3333"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/api/readiness').then((r)=>r.ok?r.json():Promise.reject(new Error(String(r.status)))).then((p)=>{if(p.status!=='ready') process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

  frontend:
    profiles: ["app"]
    container_name: movy-frontend
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://backend:3333
      NEXT_PUBLIC_WS_URL: http://backend:3333
      MOVY_ALLOW_DASHBOARD_FALLBACK: "false"
      MOVY_DEMO_ADMIN_EMAIL: admin@movy.local
      MOVY_DEMO_ADMIN_PASSWORD: admin123
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>r.ok?r.json():Promise.reject(new Error(String(r.status)))).then((p)=>{if(p.status!=='ok') process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
