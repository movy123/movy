name: movy-production

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PRODUCTION_POSTGRES_DB}
      POSTGRES_USER: ${PRODUCTION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PRODUCTION_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCTION_POSTGRES_USER} -d ${PRODUCTION_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
    networks:
      - movy_production

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - production_redis_data:/data
    networks:
      - movy_production

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3333
      MOVY_DATA_MODE: prisma
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      HELMET_ENABLED: ${HELMET_ENABLED:-true}
      MOVY_ALLOW_DASHBOARD_FALLBACK: "false"
      MOVY_DEMO_ADMIN_EMAIL: ${MOVY_DEMO_ADMIN_EMAIL:-}
      MOVY_DEMO_ADMIN_PASSWORD: ${MOVY_DEMO_ADMIN_PASSWORD:-}
      MOVY_DEMO_PASSENGER_EMAIL: ${MOVY_DEMO_PASSENGER_EMAIL:-}
      MOVY_DEMO_PASSENGER_PASSWORD: ${MOVY_DEMO_PASSENGER_PASSWORD:-}
      MOVY_DEMO_DRIVER_EMAIL: ${MOVY_DEMO_DRIVER_EMAIL:-}
      MOVY_DEMO_DRIVER_PASSWORD: ${MOVY_DEMO_DRIVER_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/api/readiness').then((r)=>r.ok?r.json():Promise.reject(new Error(String(r.status)))).then((p)=>{if(p.status!=='ready') process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3333:3333"
    networks:
      - movy_production

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${PRODUCTION_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${PRODUCTION_PUBLIC_WS_URL}
      MOVY_ALLOW_DASHBOARD_FALLBACK: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r)=>r.ok?r.json():Promise.reject(new Error(String(r.status)))).then((p)=>{if(p.status!=='ok') process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3000:3000"
    networks:
      - movy_production

networks:
  movy_production:

volumes:
  production_postgres_data:
  production_redis_data:
